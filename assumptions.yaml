# ============================================================================
#  assumptions.yaml  --  the single source of truth for every tunable number
# ============================================================================
#
# This file is the heart of the project's credibility. EVERY operational and
# cost parameter lives here, and every one carries a `source` field:
#
#     source: "cited"   -> backed by a published benchmark (put the link/ref in `note`)
#     source: "assumed" -> our own estimate (explain the reasoning in `note`)
#
# Rule: never bury a number in code. If a value matters, it lives here.
# The sensitivity analysis (Phase 5) sweeps the values flagged `star: true`.
#
# Values below are PLACEHOLDERS to be replaced with sourced numbers as we build.
# ============================================================================

meta:
  project: "Konbini-Seattle feasibility model"
  version: "0.1.0-skeleton"
  currency: "USD"
  notes: "v1.0 study area = dense northern core; production hub = SoDo."
  sources: "All external data + benchmark citations with links: see SOURCES.md"

# ----------------------------------------------------------------------------
# 1. STUDY AREA  (Phase 1-2)
# ----------------------------------------------------------------------------
study_area:
  neighborhoods:
    value: ["Downtown/CBD", "Belltown", "South Lake Union", "Capitol Hill",
            "First Hill", "Pioneer Square", "Chinatown-International District"]
    source: "assumed"
    note: "Chosen for high density + daytime population; see SEATTLE_PLAN.md sec 4."
  production_hub:
    value: "SoDo industrial district"
    source: "assumed"
    note: "Industrial zoning, port proximity, freeway access. Fixed-hub framing (Phase 3)."

# ----------------------------------------------------------------------------
# 2. DEMAND  (Phase 1)   --  the most uncertain layer
#    daily_demand_per_node = catchment_pop x capture_rate x visit_freq x avg_ticket
# ----------------------------------------------------------------------------
demand:
  capture_rate:
    value: 0.025         # fraction of daytime catchment that transacts per day
    range: [0.01, 0.05]  # swept in sensitivity analysis
    source: "derived"    # cited transaction volumes / assumed applicability; derivation in SOURCES.md
    star: true           # THE headline sensitivity parameter
    note: >
      Fraction of daytime catchment that transacts per day -- the model's most uncertain
      input, hence the wide swept range. Derived, not directly published: cited store
      transaction volumes (US c-store avg 1,491/day incl. fuel per NACS 2023; Japanese
      7-Eleven ~950 customers/day as the ceiling) divided by our own computed walkshed
      populations (~46k per 400m walkshed in the CBD, ~25k in SLU/Belltown/First Hill,
      ~5-11k elsewhere) imply ~1-5% capture; midpoint 2.5%. Interpreted as network
      penetration of COVERED catchment -- Phase 3 siting counts only demand within store
      coverage radii. US konbini-style ventures (Amazon Go wind-down, Foxtrot bankruptcy)
      struggled commercially, arguing for weight on the low end. Full derivation +
      citations in SOURCES.md.
  visit_frequency:
    value: 1.0           # visits per capturing customer per day
    source: "assumed"
    note: "PLACEHOLDER."
  avg_ticket:
    value: 7.80          # average $ spent per visit
    range: [5.0, 10.0]
    source: "cited"
    note: "NACS 2023 US convenience average basket = $7.80. Amazon Go ~$10 (grab-and-go); konbini ~$4-5. Source: NACS State of the Industry 2023."
  # Catchment = worker_weight * workers + resident_weight * residents.
  # The core is daytime-driven, so a present worker counts more than a resident
  # (residents are partly away at work and shop more from home).
  worker_weight:
    value: 1.0
    source: "assumed"
    note: "Reference: 1 daytime worker = 1 catchment unit. capture_rate sets absolute scale."
  resident_weight:
    value: 0.5
    range: [0.2, 0.8]
    source: "assumed"
    star: true
    note: "A resident's daily konbini propensity relative to a worker's. Sweep this ratio."

# ----------------------------------------------------------------------------
# 3. NETWORK / DRIVE-TIME  (Phase 2)
# ----------------------------------------------------------------------------
network:
  fresh_delivery_window_min:
    value: 30
    source: "assumed"
    note: "PLACEHOLDER. Max drive-time hub->store for short-shelf-life items."
  avg_speed_kmh:
    value: 25
    source: "assumed"
    note: "PLACEHOLDER. Urban core average incl. traffic; refine from OSM speed tags."

# ----------------------------------------------------------------------------
# 4. FACILITY LOCATION  (Phase 3)  --  Maximal Covering Location Problem
# ----------------------------------------------------------------------------
facility_location:
  num_nodes_p:
    value: 10            # number of stores to place
    range: [5, 20]       # sweep -> network scale becomes a knob
    source: "assumed"
    star: true
    note: "MCLP fixed-p. Sweeping p drives routing + economics."
  coverage_radius_m:
    value: 400           # walk/drive catchment radius per node
    source: "assumed"
    note: "PLACEHOLDER. ~5 min walk. Area-dominance density constraint applies."

# ----------------------------------------------------------------------------
# 5. ROUTING / CADENCE  (Phase 4)  --  Vehicle Routing Problem w/ time windows
# ----------------------------------------------------------------------------
routing:
  deliveries_per_day:
    value: 3
    range: [1, 4]
    source: "cited"
    star: true
    note: "Konbini multi-daily fresh cadence. CITE published 7-Eleven Japan benchmark."
  vehicle_capacity_units:
    value: 200
    source: "assumed"
    note: "PLACEHOLDER. Per-vehicle load in store-units."
  vehicle_fixed_cost_per_day:
    value: 150
    source: "assumed"
    note: "PLACEHOLDER. Lease + insurance + depreciation, refrigerated van."
  driver_cost_per_hour:
    value: 30
    source: "assumed"
    note: "PLACEHOLDER. Seattle wage + burden. Link to economics.labor."

# ----------------------------------------------------------------------------
# 6. ECONOMICS  (Phase 5)
# ----------------------------------------------------------------------------
economics:
  node_rent_per_month:
    value: 8000
    source: "assumed"
    note: "PLACEHOLDER. Small core retail slot."
  labor_wage_per_hour:
    value: 21.30
    range: [19.0, 26.0]
    source: "cited"
    star: true
    note: >
      Seattle minimum wage effective 2026-01-01, per the Office of Labor Standards
      (2025 rate was $20.76; ordinance indexes annually to CPI-W). Applies to all
      employer sizes. Link in SOURCES.md.
  staff_hours_per_day:
    value: 32            # e.g. ~2 staff x 16 open-hours
    source: "assumed"
    note: "PLACEHOLDER."
  product_cost_ratio:
    value: 0.65          # COGS as fraction of revenue
    source: "assumed"
    note: "PLACEHOLDER. Convenience/fresh blended margin."
  spoilage_rate:
    value: 0.08          # fraction of fresh product wasted
    range: [0.03, 0.15]
    source: "assumed"
    star: true
    note: "PLACEHOLDER. Fresh short-shelf-life waste."
  hub_opex_per_day:
    value: 5000
    source: "assumed"
    note: "PLACEHOLDER. SoDo commissary daily operating cost, allocated across nodes."

# ----------------------------------------------------------------------------
# 7. FEASIBILITY BAR  (Phase 5)  --  PRE-REGISTERED. Do not change after seeing results.
# ----------------------------------------------------------------------------
feasibility_bar:
  primary:
    metric: "contribution_margin_per_node"
    rule: "> 0"
    note: "Revenue covers variable costs (product + delivery share + direct labor)."
  secondary:
    metric: "payback_period_years"
    rule: "< 5"
    note: "Operator-realistic lens; depends on capex guesses, so secondary only."
